name: Daily Automated Commit

on:
  schedule:
    - cron: '30 2 * * *'   # Runs every day at 02:30 UTC
  workflow_dispatch:         # Allows manual triggering (for testing!)

jobs:
  daily-commit:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run daily update for 23f3001451@ds.study.iitm.ac.in
        run: |
          echo "Daily update on $(date)" >> daily_log.txt

      - name: Commit and push changes
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "23f3001451@ds.study.iitm.ac.in"
          git add daily_log.txt
          git commit -m "Automated daily commit - $(date '+%Y-%m-%d %H:%M:%S')"
          git push
